name: Continuous Integration

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoice_user
          POSTGRES_PASSWORD: invoice_pass
          POSTGRES_DB: invoice_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U invoice_user -d invoice_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://invoice_user:invoice_pass@localhost:5432/invoice_test_db

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test

  build:
    name: Build, Scan and Publish Image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    env:
      IMAGE_NAME: ${{ vars.ECR_REGISTRY }}/${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: |
            mi-app:local
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: mi-app:local
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: CRITICAL,HIGH

      - name: Push Docker Image
        if: github.event_name == "push"
        run: |
          docker push $IMAGE_NAME:sha-${GITHUB_SHA}
          docker push $IMAGE_NAME:latest
